<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">amazon</div>

        <div class="search-box">
            <input type="text" placeholder="Search Amazon">
            <button>Search</button>
        </div>

        <div class="nav-links">
            <p>Hello, Sign In</p>
            <p>Returns & Orders</p>
            <p>Cart 🛒</p>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to Amazon Clone</h1>
    </section>

    <!-- Products -->
    <section class="products">

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" alt="">
            <h3>Smart Phone</h3>
            <p>₹29,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="">
            <h3>Shoes</h3>
            <p>₹2,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e" alt="">
            <h3>Headphones</h3>
            <p>₹1,999</p>
            <button>Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="">
            <h3>Watch</h3>
            <p>₹4,999</p>
            <button>Add to Cart</button>
        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
